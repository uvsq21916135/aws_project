<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dames Online - Authentication</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/backEnd/utils.js" defer></script>
    <script src="/backEnd/gameLogic.js" defer></script>
    <script src="/backEnd/rules.js" defer></script>
    <script src="/ui.js" defer></script>
</head>
<body>

    <div class="auth-wrapper">

        <div class="auth-section">
            <h2>Inscription</h2>
            <p>Nouveau joueur ? Créez un profil.</p>
            <form id="regForm">
                <div class="form-group">
                    <input type="text" id="reg-username" placeholder="Choisissez un pseudo" required autocomplete="off">
                </div>
                <div class="form-group">
                    <input type="password" id="reg-password" placeholder="Mot de passe" required>
                </div>
                <button type="submit">Créer mon compte</button>
                <div id="reg-feedback" class="feedback"></div>
            </form>
        </div>


        <div class="auth-section">
            <h2>Connexion</h2>
            <p>Déjà enregistré ? Connectez-vous.</p>
            <form id="logForm">
                <div class="form-group">
                    <input type="text" id="log-username" placeholder="Pseudo" required autocomplete="username">
                </div>
                <div class="form-group">
                    <input type="password" id="log-password" placeholder="Mot de passe" required autocomplete="current-password">
                </div>
                <button type="submit">Se connecter</button>
                <div id="log-feedback" class="feedback"></div>
            </form>
        </div>
    </div>

    <div id="lobby" class="auth-wrapper" style="display: none;">
        <h2>Liste des joueurs</h2>
        <ul id="user-list" style="list-style: none;"></ul>
    </div>

    <div id="game-header" style="display: none; width: 100%; justify-content: center; margin-top: 20px;"></div>
    <div id="container" style="display: none;"></div>
    <div id="game-footer" style="display: none; width: 100%; justify-content: center; margin-top: 20px;"></div>

    <script>
        window.myUsername = null;

        async function refreshUserList() {
            const response = await fetch("/users");
            const users = await response.json();
            window.allUsersInfo = users;
            
            const userList = document.getElementById("user-list");
            userList.innerHTML = "";
            
            users.forEach(user => {
                const li = document.createElement("li");
                li.style.marginBottom = "10px";
                li.textContent = user.username + " (Victoires: " + user.wins + ")";
                
                if (user.username !== window.myUsername) {
                    const duelButton = document.createElement("button");
                    duelButton.textContent = "Défier";
                    duelButton.style.marginLeft = "15px";
                    duelButton.style.padding = "5px 10px";
                    duelButton.style.width = "auto";
                    duelButton.onclick = () => {
                        window.gameSocket.send(JSON.stringify({ type: "CHALLENGE", to: user.username, from: window.myUsername }));
                        alert("Défi envoyé à " + user.username + "... en attente de réponse !");
                    };
                    li.appendChild(duelButton);
                }
                userList.appendChild(li);
            });
        }

        async function showLobby() {
            document.querySelector(".auth-wrapper").style.display = "none";
            document.getElementById("lobby").style.display = "flex";

            window.myUsername = document.getElementById("log-username").value || document.getElementById("reg-username").value;

            await refreshUserList();

            const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
            const socket = new WebSocket(protocol + window.location.host);
            window.gameSocket = socket;

            socket.onopen = () => {
                socket.send(JSON.stringify({ type: "IDENTIFY", username: myUsername }));
            };

            socket.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                
                if (msg.type === "INCOMING_CHALLENGE") {
                    const accept = confirm(msg.from + " veut vous défier ! Acceptez-vous le duel ?");
                    if (accept) {
                        socket.send(JSON.stringify({ type: "ACCEPT_CHALLENGE", to: msg.from, from: window.myUsername }));
                        alert("Défi accepté ! C'est l'heure du duel !");
                        document.getElementById("lobby").style.display = "none";
                        document.getElementById("container").style.display = "flex";
                        if (typeof render === "function") render();
                        createSurrenderButton();

                    } else {
                        socket.send(JSON.stringify({ type: "DECLINE_CHALLENGE", to: msg.from, from: window.myUsername }));
                    }

                } else if (msg.type === "CHALLENGE_ACCEPTED") {
                    alert(msg.from + " a accepté votre défi ! C'est l'heure du duel !");
                    document.getElementById("lobby").style.display = "none";
                    document.getElementById("container").style.display = "flex";
                    if (typeof render === "function") render();
                    createSurrenderButton();

                } else if (msg.type === "CHALLENGE_DECLINED") {
                    alert(msg.from + " est une poule mouillée.");

                } else if (msg.type === "GAME_START") {
                    window.myPlayerId = msg.role;
                    window.opponentUsername = msg.opponent;
                    
                    const oppInfo = window.allUsersInfo ? window.allUsersInfo.find(u => u.username === msg.opponent) : null;
                    const wins = oppInfo ? oppInfo.wins : '?';
                    
                    const header = document.getElementById("game-header");
                    header.style.display = "flex";
                    header.innerHTML = `
                        <div style="display: flex; align-items: center; background: rgba(15, 23, 42, 0.8); padding: 10px 20px; border-radius: 12px; color: white; width: 100%; max-width: 530px; justify-content: space-between; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);">
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <div style="width: 45px; height: 45px; background: var(--accent-color); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.4rem; box-shadow: inset 0 2px 4px rgba(255,255,255,0.3);">
                                    ${msg.opponent.charAt(0).toUpperCase()}
                                </div>
                                <div style="display: flex; flex-direction: column; align-items: flex-start;">
                                    <span style="font-weight: 700; font-size: 1.2rem; letter-spacing: 0.5px;">${msg.opponent}</span>
                                    <div style="display: flex; align-items: center; gap: 5px; margin-top: 2px;">
                                        <span style="display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #10b981; box-shadow: 0 0 5px #10b981;"></span>
                                        <span style="font-size: 0.85rem; color: #94a3b8; font-weight: 600;">En jeu</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div style="flex: 1; display: flex; justify-content: center;">
                                <div style="display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.4); padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);">
                                    <span id="turn-diode" style="display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #64748b; transition: all 0.3s ease;"></span>
                                    <span id="turn-text" style="font-size: 0.85rem; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; transition: color 0.3s ease;">...</span>
                                </div>
                            </div>

                            <div style="text-align: right; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 8px;">
                                <div style="font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; font-weight: 800; letter-spacing: 1px;">Victoires</div>
                                <div style="font-weight: 800; color: #facc15; font-size: 1.1rem;">🏆 ${wins}</div>
                            </div>
                        </div>
                    `;

                    alert("Vous jouez les " + (msg.role === 1 ? "Blancs" : "Noirs") + " !");

                } else if (msg.type === "OPPONENT_MOVE") {
                    makeMove(msg.startRow, msg.startCol, msg.endRow, msg.endCol);
                    if (typeof render === "function") render();

                } else if (msg.type === "OPPONENT_QUIT") {
                    alert("Votre adversaire a fui le combat lâchement... Victoire par forfait ! (+1)");
                    returnToLobby();
                }
            };
        }
        
        function createSurrenderButton() {
            const footer = document.getElementById("game-footer");
            footer.style.display = "flex";
            const btn = document.createElement("button");
            btn.id = "surrender-btn";
            btn.textContent = "Abandonner";
            btn.style.cssText = "display:block; margin: 15px auto; padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; font-family: 'Outfit', sans-serif;";
            btn.onclick = () => {
                if (confirm("Sérieux ? Abandonner ?")) {
                    window.gameSocket.send(JSON.stringify({ 
                        type: "GAME_OVER", 
                        winnerUsername: window.opponentUsername, 
                        loserUsername: window.myUsername 
                    }));
                    alert("Vous avez abandonné la partie.");
                    returnToLobby();
                }
            };
            footer.appendChild(btn);
        }

        function returnToLobby() {
            document.getElementById("container").style.display = "none";
            document.getElementById("game-header").style.display = "none";
            document.getElementById("game-footer").style.display = "none";
            document.getElementById("lobby").style.display = "flex";
            
            window.opponentUsername = null;
            window.myPlayerId = null;

            if (typeof resetGame === "function") resetGame();
            if (typeof render === "function") render();
            
            const btn = document.getElementById("surrender-btn");
            if (btn) btn.remove();
            
            setTimeout(() => {
                if (typeof refreshUserList === "function") refreshUserList();
            }, 800);
        }

        function updateTurnIndicator() {
            const diode = document.getElementById('turn-diode');
            const text = document.getElementById('turn-text');
            if (!diode || !text) return;
            
            // currentPlayer est définie globalement dans gameLogic.js
            if (window.myPlayerId === currentPlayer) {
                // Diode Verte/Bleutée pour mon tour
                diode.style.background = '#10b981';
                diode.style.boxShadow = '0 0 10px #10b981, 0 0 20px #10b981';
                text.style.color = '#34d399';
                text.textContent = 'À TOI DE JOUER';
            } else {
                // Diode Rouge pour l'adversaire
                diode.style.background = '#ef4444';
                diode.style.boxShadow = '0 0 10px #ef4444';
                text.style.color = '#f87171';
                text.textContent = 'TOUR ADVERSE';
            }
        }

        async function authenticate(endpoint, user, pass, displayId) {
            const display = document.getElementById(displayId);
            display.textContent = "Traitement...";
            display.className = "feedback";

            try {
                const res = await fetch(endpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    display.textContent = data.error || "Erreur inconnue";
                    display.className = "feedback error";
                } else {
                    display.textContent = data.message;
                    display.className = "feedback success";
                    if (endpoint === "/login") {
                        showLobby();
                    }
                }
            } catch (err) {
                display.textContent = "Erreur de connexion au serveur.";
                display.className = "feedback error";
            }
        }

        document.getElementById("regForm").addEventListener("submit", (e) => {
            e.preventDefault();
            authenticate("/register", 
                document.getElementById("reg-username").value, 
                document.getElementById("reg-password").value, 
                "reg-feedback");
        });

        document.getElementById("logForm").addEventListener("submit", (e) => {
            e.preventDefault();
            authenticate("/login", 
                document.getElementById("log-username").value, 
                document.getElementById("log-password").value, 
                "log-feedback");
        });
    </script>
</body>
</html>
